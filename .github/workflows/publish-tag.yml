name: Publish Release Teraslice NPM Packages and Docker Image

on:
  workflow_call:

jobs:
  ensure-non-pre-release:
    runs-on: ubuntu-latest
    outputs:
      teraslice_version: ${{ steps.teraslice-version.outputs.teraslice_version }}
      is_dev_release: ${{ steps.teraslice-version.outputs.is_dev_release }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Retrieve Teraslice version & Check if Prerelease
        id: teraslice-version
        run: |
          TERASLICE_VERSION=$(jq -r .version package.json)
          echo "teraslice_version=$TERASLICE_VERSION" | tee -a $GITHUB_OUTPUT
          PRERELEASE_TAG=$(./scripts/semver-tool.sh get prerelease $TERASLICE_VERSION)
          IS_DEV_RELEASE=$([ -n "$PRERELEASE_TAG" ] && echo true || echo false)
          echo "is_dev_release=$IS_DEV_RELEASE" | tee -a $GITHUB_OUTPUT

  build-release:
    needs: ensure-non-pre-release
    if: needs.ensure-non-pre-release.outputs.is_dev_release == 'false'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version:  24
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install and build packages
        run: pnpm install --frozen-lockfile && pnpm run setup

      - name: Publish to npm
        run: pnpm ts-scripts publish -t tag npm

  docker-build-publish:
    needs: ensure-non-pre-release
    if: needs.ensure-non-pre-release.outputs.is_dev_release == 'false'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      # we login to docker to publish new teraslice image
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install and build packages
        run: pnpm install --frozen-lockfile && pnpm run setup

      - name: Publish to docker
        id: docker-publish
        run: |
          pnpm ts-scripts publish -t tag -n ${{ matrix.node-version }} docker 2>/dev/null | tee /tmp/docker-output.txt
          grep "^- " /tmp/docker-output.txt | sed 's/^- //' > /tmp/docker-tags.txt
          echo "images=$(grep "^- " /tmp/docker-output.txt | sed 's/^- //' | paste -sd ',' -)" >> $GITHUB_OUTPUT

      - name: Upload docker tags artifact
        if: steps.docker-publish.outputs.images != ''
        uses: actions/upload-artifact@v4
        with:
          name: docker-tags-node${{ matrix.node-version }}
          path: /tmp/docker-tags.txt

  append-docker-tags-to-release:
    needs: [ensure-non-pre-release, docker-build-publish]
    if: needs.ensure-non-pre-release.outputs.is_dev_release == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download docker tags artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: docker-tags-node*
          merge-multiple: false
          path: artifacts

      - name: Build release body appendix
        id: build-body
        run: |
          BODY=$'### Docker Images\n\n'
          for dir in artifacts/docker-tags-node*/; do
            [ -d "$dir" ] || continue
            while IFS= read -r img; do
              [ -z "$img" ] && continue
              BODY+="  - \`${img}\`"$'\n'
            done < "$dir/docker-tags.txt"
          done
          {
            echo "body<<EOF"
            printf '%s' "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Append docker tags to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.ensure-non-pre-release.outputs.teraslice_version }}
          append_body: true
          body: ${{ steps.build-body.outputs.body }}

  slack-announcement:
    needs: [ensure-non-pre-release, build-release, docker-build-publish, append-docker-tags-to-release]
    runs-on: ubuntu-latest
    steps:
      - name: Announce release in Slack releases channel
        id: announce-release
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASES_CHANNEL_ID }}
            text: |
              Teraslice version `v${{ needs.ensure-non-pre-release.outputs.teraslice_version }}` has been released.
              Please review and revise the automated release notes:
              https://github.com/terascope/teraslice/releases/tag/v${{ needs.ensure-non-pre-release.outputs.teraslice_version }}
              NPM release: https://www.npmjs.com/package/teraslice/v/${{ needs.ensure-non-pre-release.outputs.teraslice_version }}
              Docker images: https://github.com/terascope/teraslice/pkgs/container/teraslice

      - name: Failed Announcement Response
        if: ${{ steps.announce-release.outputs.ok == 'false' }}
        run: echo "Slackbot API failure response - ${{ steps.announce-release.outputs.response }}"
