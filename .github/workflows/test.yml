      # we login to docker to avoid docker pull limit rates
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Install and build packages
        run: pnpm install && pnpm run setup

      - name: Create Docker Image List
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm run docker:listImages
          cat ./images/image-list.txt

      - name: Restore Docker image cache
        id: docker-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/docker_cache
          key: docker-images-${{ hashFiles('./images/image-list.txt') }}-master
          restore-keys: |
            docker-images-${{ hashFiles('./images/image-list.txt') }}-
            docker-images-

      - name: Test ${{ matrix.search-version }}
        env:
          REPORT_COVERAGE: true
        run: |
          export OPENSEARCH_PORT=$(../../scripts/get-random-port.sh)
          pnpm run test:${{ matrix.search-version }}
        working-directory: ./packages/elasticsearch-api

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: logs.commit-${{ needs.compute-vars.outputs.COMMIT_SHORT_SHA }}.job-${{ github.job }}.node-${{ matrix.node-version }}.${{ matrix.search-version }}
          path: packages/elasticsearch-api/logs/*.log
          retention-days: 3

      - name: Upload es-api node-${{ matrix.node-version }} ${{ matrix.search-version }} test coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          fail_ci_if_error: false
          codecov_yml_path: ./.github/codecov.yaml
          flags: es-api-integration,integration
          name: es-api-${{ matrix.search-version }}-node-${{ matrix.node-version }}-tests
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true # optional (default = false)

  e2e-tests:
    if: needs.determine-tests-based-off-commit.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      [
        compute-vars,
        verify-build,
        cache-docker-images,
        cache-asset-bundles,
        determine-tests-based-off-commit,
        build-dev-docker-images,
      ]
    strategy:
      # opensearch is finicky, keep testing others if it fails
      fail-fast: false
      matrix: ${{ fromJSON(needs.compute-vars.outputs.NATIVE_E2E_MATRIX) }}
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      # we login to docker to avoid docker pull limit rates
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Install and build packages
        run: pnpm install && pnpm run setup

      - name: Create Docker Image List
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm run docker:listImages
          cat ./images/image-list.txt

      - name: Restore Docker image cache
        id: docker-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/docker_cache
          key: docker-images-${{ hashFiles('./images/image-list.txt') }}-master
          restore-keys: |
            docker-images-${{ hashFiles('./images/image-list.txt') }}-
            docker-images-

      - name: Download dev docker image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ github.run_id }}-nodev${{ matrix.node-version }}.tar
          path: ${{ runner.temp }}

      - name: Load dev docker image
        run: |
          docker load --input ${{ runner.temp }}/${{ github.run_id }}-nodev${{ matrix.node-version }}.tar
          rm ${{ runner.temp }}/${{ github.run_id }}-nodev${{ matrix.node-version }}.tar
          docker image ls -a

      - name: Compile e2e code
        run: pnpm run build
        working-directory: ./e2e

      - name: Get Asset Bundle List From Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: asset-bundle-txt-file-list
          path: ${{ github.workspace }}/e2e/scripts

      - name: Restore asset bundle cache
        id: asset-bundle-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/teraslice_assets
          key: asset-bundles-${{ hashFiles('./e2e/scripts/ci_asset_bundle_list.txt') }}

      - name: Test ${{ matrix.search-version }}
        run: |
          export OPENSEARCH_PORT=$(../scripts/get-random-port.sh)
          export KAFKA_PORT=$(../scripts/get-random-port.sh)
          export ZOOKEEPER_PORT=$(../scripts/get-random-port.sh)
          export MINIO_PORT=$(../scripts/get-random-port.sh)
          export TERASLICE_PORT=$(../scripts/get-random-port.sh)
          NODE_VERSION=${{ matrix.node-version }} DEV_DOCKER_IMAGE=${{ github.run_id }} SKIP_DOCKER_BUILD_IN_E2E='true' pnpm run test:${{ matrix.search-version }}
        working-directory: ./e2e

      - name: Upload logs artifact
        if: always()
        id: upload-logs-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: logs.commit-${{ needs.compute-vars.outputs.COMMIT_SHORT_SHA }}.job-${{ github.job }}.node-${{ matrix.node-version }}.${{ matrix.search-version }}
          path: e2e/logs/*.log
          retention-days: 3

  test-website:
    if: needs.determine-tests-based-off-commit.outputs.website == 'true'
    needs: [verify-build, determine-tests-based-off-commit, compute-vars]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ needs.compute-vars.outputs.NODE_VERSION_MAIN }}
          cache: "pnpm"
      - name: Build documentation
        run: pnpm install && ./scripts/build-documentation.sh
      - name: Check Output
        run: find ./website/build
  check-docker-limit-after:
    needs:
      [
        build-dev-docker-images,
        e2e-k8s-v2-encrypted-tests,
        e2e-external-asset-storage-tests,
        e2e-external-asset-storage-tests-encrypted,
        e2e-k8s-v2-tests,
        e2e-tests,
        elasticsearch-api-tests,
        elasticsearch-store-tests,
        teraslice-elasticsearch-tests,
      ]
    if: always()
    uses: terascope/workflows/.github/workflows/check-docker-limit.yml@ce327af249470d5d00c81e9e80dc714c860ac5bb
    permissions:
      contents: read
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  check-github-api-limit-after:
    needs:
      [
        build-dev-docker-images,
        e2e-k8s-v2-encrypted-tests,
        e2e-external-asset-storage-tests,
        e2e-external-asset-storage-tests-encrypted,
        e2e-k8s-v2-tests,
        e2e-tests,
        elasticsearch-api-tests,
        elasticsearch-store-tests,
        teraslice-elasticsearch-tests,
        xlucene-translator-tests,
      ]
    if: always()
    uses: terascope/workflows/.github/workflows/check-github-api-limit.yml@ce327af249470d5d00c81e9e80dc714c860ac5bb
    permissions: {}

  all-tests-passed:
    needs:
      [
        linux-unit-tests,
        build-dev-docker-images,
        e2e-k8s-v2-encrypted-tests,
        e2e-external-asset-storage-tests,
        e2e-external-asset-storage-tests-encrypted,
        e2e-k8s-v2-tests,
        e2e-tests,
        elasticsearch-api-tests,
        elasticsearch-store-tests,
        teraslice-elasticsearch-tests,
        xlucene-translator-tests,
        lint-and-sync,
        test-website,
        determine-tests-based-off-commit,
      ]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Check job results
        run: |
          failed=""

          declare -A results
          results["linux-unit-tests"]="${{ needs.linux-unit-tests.result }}"
          results["xlucene-translator-tests"]="${{ needs.xlucene-translator-tests.result }}"
          results["e2e-k8s-v2-encrypted-tests"]="${{ needs.e2e-k8s-v2-encrypted-tests.result }}"
          results["e2e-external-asset-storage-tests"]="${{ needs.e2e-external-asset-storage-tests.result }}"
          results["e2e-external-asset-storage-tests-encrypted"]="${{ needs.e2e-external-asset-storage-tests-encrypted.result }}"
          results["e2e-k8s-v2-tests"]="${{ needs.e2e-k8s-v2-tests.result }}"
          results["e2e-tests"]="${{ needs.e2e-tests.result }}"
          results["elasticsearch-api-tests"]="${{ needs.elasticsearch-api-tests.result }}"
          results["elasticsearch-store-tests"]="${{ needs.elasticsearch-store-tests.result }}"
          results["teraslice-elasticsearch-tests"]="${{ needs.teraslice-elasticsearch-tests.result }}"
          results["lint-and-sync"]="${{ needs.lint-and-sync.result }}"
          results["test-website"]="${{ needs.test-website.result }}"
          results["determine-tests-based-off-commit"]="${{needs.determine-tests-based-off-commit.result}}"

          for job in "${!results[@]}"; do
            result="${results[$job]}"
            echo "$job: $result"
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              failed+="$job ($result)\n"
            fi
          done

          if [[ -n "$failed" ]]; then
            echo -e "::error::Some jobs failed or were cancelled:\n$failed"
            exit 1
          fi

          echo "All required jobs passed or were skipped."
