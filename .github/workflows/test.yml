name: Teraslice CI Tests
# this will technically run again on merge to master, should limit it
on:
  pull_request:
    branches:
      - master
      - "release/teraslice-v*"

permissions: {}

env:
  NODE_VERSIONS: "[22, 24]"
  NODE_VERSION_MAIN: "24"
  NODE_VERSIONS_OTHER: "[22]"
  NODE_VERSIONS_K8S: "[22, 24]"
  NODE_VERSIONS_EXT_STORAGE: "[24]"
  HELM_VERSION: "v4.1.1"
  HELM_DIFF_VERSION: "v3.15.2"
  HELMFILE_VERSION: "v1.3.1"

jobs:
  compute-vars:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      NODE_VERSIONS: ${{ steps.node-version.outputs.NODE_VERSIONS }}
      NODE_VERSION_MAIN: ${{ steps.node-version-main.outputs.NODE_VERSION_MAIN }}
      NODE_VERSIONS_K8S: ${{ steps.node-version-k8s.outputs.NODE_VERSIONS_K8S }}
      NODE_VERSIONS_EXT_STORAGE: ${{ steps.node-version-ext-storage.outputs.NODE_VERSIONS_EXT_STORAGE }}
      NATIVE_E2E_MATRIX: ${{ steps.native-e2e-matrix.outputs.NATIVE_E2E_MATRIX }}
      COMMIT_SHORT_SHA: ${{ steps.get-short-sha.outputs.COMMIT_SHORT_SHA }}
      HELM_VERSION: ${{ steps.helm-version.outputs.HELM_VERSION }}
      HELM_DIFF_VERSION: ${{ steps.helm-diff-version.outputs.HELM_DIFF_VERSION }}
      HELMFILE_VERSION: ${{ steps.helmfile-version.outputs.HELMFILE_VERSION }}
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - id: node-version
        run: echo "NODE_VERSIONS=${{ env.NODE_VERSIONS }}" >> $GITHUB_OUTPUT
      - id: node-version-main
        run: echo "NODE_VERSION_MAIN=${{ env.NODE_VERSION_MAIN }}" >> $GITHUB_OUTPUT
      - id: node-version-k8s
        run: echo "NODE_VERSIONS_K8S=${{ env.NODE_VERSIONS_K8S }}" >> $GITHUB_OUTPUT
      - id: node-version-ext-storage
        run: echo "NODE_VERSIONS_EXT_STORAGE=${{ env.NODE_VERSIONS_EXT_STORAGE }}" >> $GITHUB_OUTPUT
      - name: Compute native e2e test matrix
        id: native-e2e-matrix
        run: |
          MATRIX=$(jq -cn \
            --argjson main '${{ env.NODE_VERSION_MAIN }}' \
            --argjson others '${{ env.NODE_VERSIONS_OTHER }}' \
            '{include: [
              (["opensearch1","opensearch2","opensearch3"][] | {"node-version": $main, "search-version": .}),
              ($others[] | {"node-version": ., "search-version": "opensearch3"})
            ]}')
          echo "NATIVE_E2E_MATRIX=$MATRIX" >> $GITHUB_OUTPUT
      - name: Get Commit Short SHA
        id: get-short-sha
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          calculatedSha=$(git rev-parse --short "$HEAD_SHA")
          echo "COMMIT_SHORT_SHA=$calculatedSha" >> $GITHUB_OUTPUT
      - name: Set HELM_VERSION
        id: helm-version
        run: echo "HELM_VERSION=${{ env.HELM_VERSION }}" >> $GITHUB_OUTPUT
      - name: Set HELM_DIFF_VERSION
        id: helm-diff-version
        run: echo "HELM_DIFF_VERSION=${{ env.HELM_DIFF_VERSION }}" >> $GITHUB_OUTPUT
      - name: Set HELMFILE_VERSION
        id: helmfile-version
        run: echo "HELMFILE_VERSION=${{ env.HELMFILE_VERSION }}" >> $GITHUB_OUTPUT

  verify-build:
    runs-on: ubuntu-latest
    needs: compute-vars
    permissions:
      contents: read
    outputs:
      K8S_VERSION: ${{ steps.k8s-versions.outputs.K8S_VERSION }}
      KIND_VERSION: ${{ steps.k8s-versions.outputs.KIND_VERSION }}
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ fromJSON(needs.compute-vars.outputs.NODE_VERSION_MAIN) }}
          cache: "pnpm"

      - name: Install and build packages
        run: pnpm install --frozen-lockfile && pnpm run setup

      - name: Get K8S and Kind versions
        id: k8s-versions
        run: |
          output=$(pnpm k8s:listVersions 2>&1)
          echo "$output"
          echo "K8S_VERSION=$(echo "$output" | grep 'k8sVersion:' | awk '{print $NF}')" >> $GITHUB_OUTPUT
          echo "KIND_VERSION=$(echo "$output" | grep 'kindVersion:' | awk '{print $NF}')" >> $GITHUB_OUTPUT

  check-docker-limit-before:
    uses: terascope/workflows/.github/workflows/check-docker-limit.yml@ce327af249470d5d00c81e9e80dc714c860ac5bb
    permissions:
      contents: read
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  check-github-api-limit-before:
    uses: terascope/workflows/.github/workflows/check-github-api-limit.yml@ce327af249470d5d00c81e9e80dc714c860ac5bb
    permissions: {}

  cache-docker-images:
    needs: check-docker-limit-before
    uses: terascope/workflows/.github/workflows/cache-docker-images.yml@ce327af249470d5d00c81e9e80dc714c860ac5bb
    permissions:
      contents: read
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  cache-asset-bundles:
    needs: check-github-api-limit-before
    uses: terascope/workflows/.github/workflows/cache-asset-bundles.yml@ce327af249470d5d00c81e9e80dc714c860ac5bb
    permissions:
      contents: read

  determine-tests-based-off-commit:
    runs-on: ubuntu-latest
    needs: compute-vars
    permissions:
      contents: read
    outputs:
      unit: ${{ steps.determine.outputs.unit }}
      e2e: ${{ steps.determine.outputs.e2e }}
      website: ${{ steps.determine.outputs.website }}
      integration: ${{ steps.determine.outputs.integration }}
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - name: Setup Node ${{ fromJSON(needs.compute-vars.outputs.NODE_VERSION_MAIN) }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ fromJSON(needs.compute-vars.outputs.NODE_VERSION_MAIN) }}
          cache: "pnpm"
      - name: Install and build packages
        run: pnpm install && pnpm run setup
      - name: Determine tests to run
        id: determine
        # The output of determine-tests would be a json object that looks like this:
        # {
        #   "unit": true,
        #   "e2e": true,
        #   "website": false
        # }
        run: |
          echo "Running determine-tests..."

          JSON=$(pnpm -s run determine-tests)
          echo "$JSON"

          UNIT=$(echo "$JSON" | jq -r '.unit')
          E2E=$(echo "$JSON" | jq -r '.e2e')
          WEBSITE=$(echo "$JSON" | jq -r '.website')
          INTEGRATION=$(echo "$JSON" | jq -r '.integration')

          echo "unit=$UNIT" >> $GITHUB_OUTPUT
          echo "e2e=$E2E" >> $GITHUB_OUTPUT
          echo "website=$WEBSITE" >> $GITHUB_OUTPUT
          echo "integration=$INTEGRATION" >> $GITHUB_OUTPUT

  linux-unit-tests:
    if: needs.determine-tests-based-off-commit.outputs.unit == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [determine-tests-based-off-commit, compute-vars]
    strategy:
      matrix:
        node-version: ${{ fromJSON(needs.compute-vars.outputs.NODE_VERSIONS) }}
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install and build packages
        run: pnpm install && pnpm run setup

      - name: Test
        env:
          REPORT_COVERAGE: true
          MAX_PROJECTS_PER_BATCH: 6
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run test --suite unit --

      - name: Upload Node ${{ matrix.node-version }} unit test coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          fail_ci_if_error: false
          codecov_yml_path: ./.github/codecov.yaml
          # files: ./coverage1.xml,./coverage2.xml # optional
          flags: unit
          name: node-${{ matrix.node-version }}-unit-tests
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true # optional (default = false)

  build-dev-docker-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [compute-vars]
    strategy:
      fail-fast: false # Let all matrix jobs complete
      matrix:
        node-version: ${{ fromJSON(needs.compute-vars.outputs.NODE_VERSIONS) }}
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and export
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          build-args: |
            NODE_VERSION=${{ matrix.node-version }}
          tags: ${{ github.run_id }}-nodev${{ matrix.node-version }}:latest
          outputs: type=docker,dest=${{ runner.temp }}/${{ github.run_id }}-nodev${{ matrix.node-version }}.tar

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ github.run_id }}-nodev${{ matrix.node-version }}.tar
          path: ${{ runner.temp }}/${{ github.run_id }}-nodev${{ matrix.node-version }}.tar

  e2e-k8s-v2-tests:
    if: needs.determine-tests-based-off-commit.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      [
        compute-vars,
        verify-build,
        cache-docker-images,
        cache-asset-bundles,
        determine-tests-based-off-commit,
        build-dev-docker-images,
      ]
    strategy:
      # opensearch is finicky, keep testing others if it fails
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(needs.compute-vars.outputs.NODE_VERSIONS_K8S) }}
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      # we login to docker to avoid docker pull limit rates
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Install and build packages
        run: pnpm install && pnpm run setup

      - name: Create Docker Image List
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm run docker:listImages
          cat ./images/image-list.txt

      - name: Restore Docker image cache
        id: docker-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/docker_cache
          key: docker-images-${{ hashFiles('./images/image-list.txt') }}-master
          restore-keys: |
            docker-images-${{ hashFiles('./images/image-list.txt') }}-
            docker-images-

      - name: Download dev docker image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ github.run_id }}-nodev${{ matrix.node-version }}.tar
          path: ${{ runner.temp }}

      - name: Load dev docker image
        run: |
          docker load --input ${{ runner.temp }}/${{ github.run_id }}-nodev${{ matrix.node-version }}.tar
          rm ${{ runner.temp }}/${{ github.run_id }}-nodev${{ matrix.node-version }}.tar
          docker image ls -a

      - name: Compile e2e code
        run: pnpm run build
        working-directory: ./e2e

      - name: Get Asset Bundle List From Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: asset-bundle-txt-file-list
          path: ${{ github.workspace }}/e2e/scripts

      - name: Restore asset bundle cache
        id: asset-bundle-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/teraslice_assets
          key: asset-bundles-${{ hashFiles('./e2e/scripts/ci_asset_bundle_list.txt') }}

      - name: Install Kind and Kubectl
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          install_only: "true"
          version: ${{ needs.verify-build.outputs.KIND_VERSION }}
          kubectl_version: ${{ needs.verify-build.outputs.K8S_VERSION }}

      - name: Install Helmfile
        uses: helmfile/helmfile-action@daefb3e1fa5a91b7a88d30870d20da4896944818 # v2.4.5
        with:
          helmfile-args: "version"
          helmfile-version: ${{ needs.compute-vars.outputs.HELMFILE_VERSION }}
          helm-version: ${{ needs.compute-vars.outputs.HELM_VERSION }}
          helm-plugins: >
            https://github.com/databus23/helm-diff@${{ needs.compute-vars.outputs.HELM_DIFF_VERSION }}
          
      - name: Test CLI Commands and Print Versions
        run: |
          command -v kind
          command -v kubectl
          command -v helm
          command -v helmfile
          kind version
          helm version
          helmfile version
          helm plugin list

      - name: Free up space before tests
        run: |
          df -h
          # Remove Android, DotNet, Haskell, and C++ libraries we don't need
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost
          df -h

      - name: Test k8s V2 opensearch2
        run: |
          export OPENSEARCH_PORT=$(../scripts/get-random-port.sh)
          export KAFKA_PORT=$(../scripts/get-random-port.sh)
          export TERASLICE_PORT=$(../scripts/get-random-port.sh)
          NODE_VERSION=${{ matrix.node-version }} DEV_DOCKER_IMAGE=${{ github.run_id }} SKIP_DOCKER_BUILD_IN_E2E='true' pnpm run test:k8sV2 --debug
        working-directory: ./e2e

      - name: Upload logs artifact
        if: always()
        id: upload-logs-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: logs.commit-${{ needs.compute-vars.outputs.COMMIT_SHORT_SHA }}.job-${{ github.job }}.node-${{ matrix.node-version }}
          path: e2e/logs/*.log
          retention-days: 3

  e2e-k8s-v2-encrypted-tests:
    if: needs.determine-tests-based-off-commit.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      [
        compute-vars,
        verify-build,
        cache-docker-images,
        cache-asset-bundles,
        determine-tests-based-off-commit,
        build-dev-docker-images,
      ]
    strategy:
      # opensearch is finicky, keep testing others if it fails
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(needs.compute-vars.outputs.NODE_VERSIONS_EXT_STORAGE) }}
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      # we login to docker to avoid docker pull limit rates
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Install and build packages
        run: pnpm install && pnpm run setup

      - name: Create Docker Image List
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm run docker:listImages
          cat ./images/image-list.txt

      - name: Restore Docker image cache
        id: docker-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/docker_cache
          key: docker-images-${{ hashFiles('./images/image-list.txt') }}-master
          restore-keys: |
            docker-images-${{ hashFiles('./images/image-list.txt') }}-
            docker-images-

      - name: Download dev docker image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ github.run_id }}-nodev${{ matrix.node-version }}.tar
          path: ${{ runner.temp }}

      - name: Load dev docker image
        run: |
          docker load --input ${{ runner.temp }}/${{ github.run_id }}-nodev${{ matrix.node-version }}.tar
          rm ${{ runner.temp }}/${{ github.run_id }}-nodev${{ matrix.node-version }}.tar
          docker image ls -a

      - name: Install mkcert
        run: curl -Ss -JLO "https://dl.filippo.io/mkcert/v1.4.4?for=linux/amd64" && sudo chmod 777 mkcert-v1.4.4-linux-amd64 && sudo cp mkcert-v1.4.4-linux-amd64 /usr/local/bin/mkcert

      - name: Install grep
        run: sudo apt update && sudo apt install grep

      - name: Check mkcert
        run: command -v mkcert

      - name: Check grep
        run: command -v grep

      - name: Compile e2e code
        run: pnpm run build
        working-directory: ./e2e

      - name: Get Asset Bundle List From Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: asset-bundle-txt-file-list
          path: ${{ github.workspace }}/e2e/scripts

      - name: Restore asset bundle cache
        id: asset-bundle-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/teraslice_assets
          key: asset-bundles-${{ hashFiles('./e2e/scripts/ci_asset_bundle_list.txt') }}

      - name: Install Kind and Kubectl
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          install_only: "true"
          version: ${{ needs.verify-build.outputs.KIND_VERSION }}
          kubectl_version: ${{ needs.verify-build.outputs.K8S_VERSION }}

      - name: Install Helmfile
        uses: helmfile/helmfile-action@daefb3e1fa5a91b7a88d30870d20da4896944818 # v2.4.5
        with:
          helmfile-args: "version"
          helmfile-version: ${{ needs.compute-vars.outputs.HELMFILE_VERSION }}
          helm-version: ${{ needs.compute-vars.outputs.HELM_VERSION }}
          helm-plugins: >
            https://github.com/databus23/helm-diff@${{ needs.compute-vars.outputs.HELM_DIFF_VERSION }}
          
      - name: Test CLI Commands and Print Versions
        run: |
          command -v kind
          command -v kubectl
          command -v helm
          command -v helmfile
          kind version
          helm version
          helmfile version
          helm plugin list

      - name: Free up space before tests
        run: |
          echo "Free space before:"
          df -h
          # Remove Android, DotNet, Haskell, and C++ libraries we don't need
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost
          echo "Free space after:"
          df -h

      - name: Test k8s V2 opensearch2
        run: |
          export OPENSEARCH_PORT=$(../scripts/get-random-port.sh)
          export KAFKA_PORT=$(../scripts/get-random-port.sh)
          export MINIO_PORT=$(../scripts/get-random-port.sh)
          export TERASLICE_PORT=$(../scripts/get-random-port.sh)
          NODE_VERSION=${{ matrix.node-version }} DEV_DOCKER_IMAGE=${{ github.run_id }} SKIP_DOCKER_BUILD_IN_E2E='true' pnpm run test:k8sV2Encrypted --debug
        working-directory: ./e2e

      - name: Upload logs artifact
        if: always()
        id: upload-logs-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: logs.commit-${{ needs.compute-vars.outputs.COMMIT_SHORT_SHA }}.job-${{ github.job }}.node-${{ matrix.node-version }}
          path: e2e/logs/*.log
          retention-days: 3

  e2e-external-asset-storage-tests:
    if: needs.determine-tests-based-off-commit.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      [
        compute-vars,
        verify-build,
        cache-docker-images,
        cache-asset-bundles,
        determine-tests-based-off-commit,
        build-dev-docker-images,
      ]
    strategy:
      # opensearch is finicky, keep testing others if it fails
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(needs.compute-vars.outputs.NODE_VERSIONS_EXT_STORAGE) }}
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install pnpm
