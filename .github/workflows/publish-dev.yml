name: Publish Teraslice Dev NPM Packages and Docker Image, Create Release

on:
  workflow_call:
    secrets:
      RELEASES_PRIVATE_KEY:
        required: true
      SLACK_BOT_TOKEN:
        required: true

permissions: {}

jobs:
  build-npm:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      local_teraslice_version: ${{ steps.teraslice-version.outputs.local_teraslice_version }}
      npm_prerelease_version: ${{ steps.npm-version.outputs.npm_prerelease_version }}
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Retrieve Teraslice version
        id: teraslice-version
        run: |
          LOCAL_TERASLICE_VERSION=$(jq -r .version package.json)
          echo "local_teraslice_version=$LOCAL_TERASLICE_VERSION" >> $GITHUB_OUTPUT

      - name: Retrieve NPM Teraslice prerelease version
        id: npm-version
        run: |
          NPM_PRERELEASE_VERSION=$(npm view teraslice dist-tags.prerelease)
          echo "npm_prerelease_version=$NPM_PRERELEASE_VERSION" >> $GITHUB_OUTPUT

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install and build packages
        run: pnpm install --frozen-lockfile && pnpm run setup

      - name: Publish to npm
        run: pnpm ts-scripts publish -t prerelease npm

  build-docker-amd64:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Get build info
        id: build-info
        run: |
          FULL_NODE=$(docker run --rm node:${{ matrix.node-version }}-alpine node -v | tr -d 'v')
          TS_VERSION=$(jq -r .version package.json)
          echo "ts_version=$TS_VERSION" >> $GITHUB_OUTPUT
          echo "image_tag=ghcr.io/terascope/teraslice:v${TS_VERSION}-nodev${FULL_NODE}" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +"%Y-%m-%dT%H:%M:%S.%3NZ")" >> $GITHUB_OUTPUT

      - name: Build and push by digest (linux/amd64)
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64
          build-args: |
            NODE_VERSION=${{ matrix.node-version }}
            TERASLICE_VERSION=${{ steps.build-info.outputs.ts_version }}
            BUILD_TIMESTAMP=${{ steps.build-info.outputs.timestamp }}
            GITHUB_SHA=${{ github.sha }}
          outputs: type=image,name=ghcr.io/terascope/teraslice,push-by-digest=true,name-canonical=true,push=true
          provenance: false

      - name: Export digest and tag
        run: |
          mkdir -p /tmp/docker-meta
          echo "${{ steps.build.outputs.digest }}" > /tmp/docker-meta/digest.txt
          echo "${{ steps.build-info.outputs.image_tag }}" > /tmp/docker-meta/tag.txt

      - name: Upload docker meta artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docker-meta-amd64-node${{ matrix.node-version }}
          path: /tmp/docker-meta/

  build-docker-arm64:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Get build info
        id: build-info
        run: |
          FULL_NODE=$(docker run --rm node:${{ matrix.node-version }}-alpine node -v | tr -d 'v')
          TS_VERSION=$(jq -r .version package.json)
          echo "ts_version=$TS_VERSION" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +"%Y-%m-%dT%H:%M:%S.%3NZ")" >> $GITHUB_OUTPUT

      - name: Build and push by digest (linux/arm64)
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/arm64
          build-args: |
            NODE_VERSION=${{ matrix.node-version }}
            TERASLICE_VERSION=${{ steps.build-info.outputs.ts_version }}
            BUILD_TIMESTAMP=${{ steps.build-info.outputs.timestamp }}
            GITHUB_SHA=${{ github.sha }}
          outputs: type=image,name=ghcr.io/terascope/teraslice,push-by-digest=true,name-canonical=true,push=true
          provenance: false

      - name: Export digest
        run: |
          mkdir -p /tmp/docker-meta
          echo "${{ steps.build.outputs.digest }}" > /tmp/docker-meta/digest.txt

      - name: Upload docker meta artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docker-meta-arm64-node${{ matrix.node-version }}
          path: /tmp/docker-meta/

  create-docker-manifests:
    if: github.event.pull_request.merged == true
    needs: [build-docker-amd64, build-docker-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Download amd64 meta
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docker-meta-amd64-node${{ matrix.node-version }}
          path: /tmp/amd64-meta

      - name: Download arm64 meta
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docker-meta-arm64-node${{ matrix.node-version }}
          path: /tmp/arm64-meta

      - name: Create and push multi-arch manifest
        run: |
          TAG=$(cat /tmp/amd64-meta/tag.txt)
          AMD64_DIGEST=$(cat /tmp/amd64-meta/digest.txt)
          ARM64_DIGEST=$(cat /tmp/arm64-meta/digest.txt)
          echo "Creating manifest for ${TAG}"
          docker buildx imagetools create \
            -t "${TAG}" \
            "ghcr.io/terascope/teraslice@${AMD64_DIGEST}" \
            "ghcr.io/terascope/teraslice@${ARM64_DIGEST}"

  create-release-on-teraslice-bump:
    if: github.event.pull_request.merged == true
    needs: build-npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version_updated: ${{ steps.version_check.outputs.version_updated }}
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Check for teraslice version update
        id: version_check
        # Create a release only for newer semver pre-release versions
        # prerelease tags are newer if alphabetically "greater"
        # rc.0 > dev.2 > dev.1 > beta.5 > alpha.12
        env:
          LOCAL_TERASLICE_VERSION: ${{ needs.build-npm.outputs.local_teraslice_version }}
          NPM_PRERELEASE_VERSION: ${{ needs.build-npm.outputs.npm_prerelease_version }}
        run: |
          echo "current version: $LOCAL_TERASLICE_VERSION"
          echo "npm version: $NPM_PRERELEASE_VERSION"

          COMP_OUTPUT=$(./scripts/semver-tool.sh compare "$LOCAL_TERASLICE_VERSION" "$NPM_PRERELEASE_VERSION")
          echo "Semver comparison output:" $COMP_OUTPUT

          PRERELEASE_TAG=$(./scripts/semver-tool.sh get prerelease "$LOCAL_TERASLICE_VERSION")
          IS_DEV_RELEASE=$([ -n "$PRERELEASE_TAG" ] && echo true || echo false)
          echo "is_dev_release=$IS_DEV_RELEASE" | tee -a $GITHUB_OUTPUT

          if [[ "$COMP_OUTPUT" = "1" && "$IS_DEV_RELEASE" = "true" ]]; then
            echo "Teraslice pre-release version updated from $NPM_PRERELEASE_VERSION to $LOCAL_TERASLICE_VERSION, creating release"
            echo "version_updated=true" >> $GITHUB_OUTPUT
            echo "tag: v$LOCAL_TERASLICE_VERSION"
            echo "tag=v$LOCAL_TERASLICE_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Teraslice pre-release version not updated, will not release"
            echo "version_updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate a token
        if: steps.version_check.outputs.version_updated == 'true'
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASES_APP_ID }}
          private-key: ${{ secrets.RELEASES_PRIVATE_KEY }}

      - name: Create Release
        if: steps.version_check.outputs.version_updated == 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          prerelease: true
          target_commitish: ${{ github.event.pull_request.base.ref }}
          tag_name: ${{ steps.version_check.outputs.tag }}
          name: ${{ steps.version_check.outputs.tag }}
          generate_release_notes: true

  slack-announcement:
    needs: [build-npm, create-release-on-teraslice-bump]
    if: needs.create-release-on-teraslice-bump.outputs.version_updated == 'true'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Announce release in Slack releases channel
        id: announce-release
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASES_CHANNEL_ID }}
            text: |
              Teraslice prerelease version `v${{ needs.build-npm.outputs.local_teraslice_version }}` has been published.
              Please review and revise the automated release notes:
              https://github.com/terascope/teraslice/releases/tag/v${{ needs.build-npm.outputs.local_teraslice_version }}
              NPM release: https://www.npmjs.com/package/teraslice/v/${{ needs.build-npm.outputs.local_teraslice_version }}
              Docker images: https://github.com/terascope/teraslice/pkgs/container/teraslice

      - name: Failed Announcement Response
        if: ${{ steps.announce-release.outputs.ok == 'false' }}
        env:
          SLACK_RESPONSE: ${{ steps.announce-release.outputs.response }}
        run: |
          echo "::add-mask::$SLACK_RESPONSE"
          echo "Slackbot API failure response - $SLACK_RESPONSE"
